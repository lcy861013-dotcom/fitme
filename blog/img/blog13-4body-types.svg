<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">4 BODY TYPES · STYLE GUIDE</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">체형별 옷 입는 법 — 4가지 체형 완전 실전 가이드</text>

  <!-- Inverted Triangle -->
  <g transform="translate(30,90)">
    <text x="85" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">역삼각형</text>
    <!-- Silhouette -->
    <polygon points="20,25 150,25 120,130 50,130" fill="none" stroke="#d4a84b" stroke-width="2"/>
    <!-- Hip -->
    <polygon points="50,130 120,130 125,165 45,165" fill="none" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="85" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">어깨 > 힙</text>
    <text x="85" y="206" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">✓ V넥 · 하체 볼륨</text>
    <text x="85" y="221" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">✓ 와이드팬츠</text>
    <text x="85" y="236" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ 보트넥 · 퍼프소매</text>
  </g>

  <!-- Hourglass -->
  <g transform="translate(215,90)">
    <text x="85" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">모래시계형</text>
    <path d="M20,25 L150,25 L120,85 L130,165 L40,165 L50,85 Z" fill="none" stroke="#d4a84b" stroke-width="2"/>
    <text x="85" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">어깨 ≈ 힙 · 허리 강조</text>
    <text x="85" y="206" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">✓ 랩드레스 · 피티드</text>
    <text x="85" y="221" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">✓ 허리 벨트 활용</text>
    <text x="85" y="236" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ 드롭웨이스트</text>
  </g>

  <!-- Rectangle -->
  <g transform="translate(400,90)">
    <text x="85" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">직사각형</text>
    <polygon points="30,25 140,25 140,165 30,165" fill="none" stroke="#d4a84b" stroke-width="2"/>
    <text x="85" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">어깨 ≈ 허리 ≈ 힙</text>
    <text x="85" y="206" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">✓ 허리 강조 러플</text>
    <text x="85" y="221" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">✓ 크롭+하이웨이스트</text>
    <text x="85" y="236" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ 단색 스트레이트</text>
  </g>

  <!-- Pear -->
  <g transform="translate(585,90)">
    <text x="85" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">서양배형</text>
    <polygon points="40,25 130,25 150,165 20,165" fill="none" stroke="#d4a84b" stroke-width="2"/>
    <text x="85" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">어깨 &lt; 힙</text>
    <text x="85" y="206" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">✓ 오프숄더 · 상체 강조</text>
    <text x="85" y="221" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">✓ A라인 스커트</text>
    <text x="85" y="236" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ 힙 강조 타이트</text>
  </g>

  <!-- Bottom message -->
  <rect x="40" y="265" width="720" height="40" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
  <text x="400" y="281" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">핵심 원칙: 강점을 강조하고 약점을 시각적으로 보완</text>
  <text x="400" y="297" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">체형에 맞는 스타일은 실루엣의 균형과 비율을 만드는 것 — 숨기는 것이 아님</text>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · 체형별 옷 입는 법 완전 가이드</text>
</svg>
