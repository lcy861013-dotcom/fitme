<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b08d3d;stop-opacity:1" />
    </linearGradient>
    <style>
      .title { font-family: 'DM Sans', sans-serif; font-size: 24px; font-weight: 700; fill: #e0dcd8; }
      .subtitle { font-family: 'DM Sans', sans-serif; font-size: 14px; fill: #8b8178; letter-spacing: 4px; }
      .label { font-family: 'DM Sans', sans-serif; font-size: 12px; fill: #8b8178; }
      .accent-text { font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; fill: #d4a84b; }
      .line { stroke: #2a2724; stroke-width: 1; }
      .accent-line { stroke: #d4a84b; stroke-width: 2; fill: none; filter: url(#glow); }
      .dashed { stroke-dasharray: 4, 3; }
    </style>
  </defs>
  <rect width="800" height="420" fill="#161412"/>
  
  <!-- Header -->
  <text x="400" y="45" text-anchor="middle" class="subtitle">UPPER BODY FIT GUIDE</text>
  <text x="400" y="75" text-anchor="middle" class="title">상의 핏과 어깨 라인 분석</text>

  
  <g transform="translate(200,130)">
    <path d="M0,50 L50,0 L150,0 L200,50 L200,200 L0,200 Z" class="accent-line" />
    <line x1="50" y1="0" x2="150" y2="0" class="accent-line" style="stroke-width:4;" />
    <text x="100" y="230" text-anchor="middle" class="accent-text">SHOULDER LINE</text>
  </g>


  <!-- Footer -->
  <line x1="100" y1="380" x2="700" y2="380" class="line" />
  <text x="400" y="405" text-anchor="middle" class="label">FITME · perfectfitme.com · Body proportion guides</text>
</svg>