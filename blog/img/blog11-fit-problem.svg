<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">WHY CLOTHES DON'T FIT</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">왜 어떤 옷은 나에게 절대 안 맞을까?</text>

  <!-- Size label problem -->
  <g transform="translate(40,90)">
    <text x="150" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#8b8178" letter-spacing="2">사이즈 태그의 거짓말</text>
    <rect x="0" y="16" width="300" height="70" rx="8" fill="#1c1a18" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="150" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="28" fill="#ff6b6b" font-weight="700">M / 95</text>
    <text x="150" y="60" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">브랜드마다 실측치가 다름</text>
    <text x="150" y="74" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">A사 M = 어깨 44cm / B사 M = 어깨 47cm</text>

    <!-- Real measurements table -->
    <rect x="0" y="100" width="300" height="140" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="150" y="118" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">실측 기준 M 사이즈 브랜드별 비교</text>
    <line x1="10" y1="126" x2="290" y2="126" stroke="#2a2724"/>
    <text x="60" y="142" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">브랜드</text>
    <text x="160" y="142" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">어깨</text>
    <text x="230" y="142" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">가슴</text>
    <text x="60" y="158" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">유니클로</text>
    <text x="160" y="158" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">44cm</text>
    <text x="230" y="158" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">96cm</text>
    <text x="60" y="174" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">자라</text>
    <text x="160" y="174" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">46cm</text>
    <text x="230" y="174" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">100cm</text>
    <text x="60" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">COS</text>
    <text x="160" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">47cm</text>
    <text x="230" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">102cm</text>
    <text x="60" y="206" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">H&amp;M</text>
    <text x="160" y="206" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">45cm</text>
    <text x="230" y="206" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">98cm</text>
    <text x="150" y="228" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">같은 M이지만 어깨 차이 3cm</text>
  </g>

  <!-- Solution -->
  <g transform="translate(380,90)">
    <text x="185" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">해결: 실측 기준으로 쇼핑하기</text>

    <rect x="0" y="16" width="370" height="56" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="185" y="36" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8" font-weight="700">내 기준표 만들기 (cm 단위)</text>
    <text x="185" y="54" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">어깨 __ cm · 가슴 __ cm · 허리 __ cm · 힙 __ cm</text>
    <text x="185" y="68" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">한 번 재두면 평생 브랜드 비교 가능</text>

    <text x="0" y="100" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178" font-weight="700">핏 문제 유형별 원인</text>
    <rect x="0" y="112" width="370" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="10" y="126" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ 어깨가 흘러내림</text>
    <text x="200" y="126" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">→ 어깨 너비 작은 사이즈 or 어깨 수선</text>
    <text x="10" y="142" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ 어깨는 맞는데 허리가 텐트</text>
    <text x="200" y="142" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">→ 허리 다트 수선 (1~2만원)</text>

    <rect x="0" y="156" width="370" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="10" y="170" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ 허리는 맞는데 힙이 당김</text>
    <text x="200" y="170" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">→ 힙 기준으로 사이즈 업 후 허리 수선</text>
    <text x="10" y="186" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ 기장이 너무 김</text>
    <text x="200" y="186" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">→ 밑단 수선 (8천~1.5만원)</text>

    <rect x="0" y="200" width="370" height="36" rx="6" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="10" y="214" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b" font-weight="700">수선 우선순위: 어깨 > 기장 > 허리</text>
    <text x="10" y="230" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">어깨만 맞으면 나머지는 수선 가능</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · 옷이 맞지 않는 진짜 이유</text>
</svg>
