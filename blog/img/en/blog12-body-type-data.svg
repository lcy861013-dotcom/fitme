<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">BODY TYPE BY DATA — NOT LABELS</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">Find Your Real Body Type with Measurements, Not Guessing</text>

  <g transform="translate(40,92)">
    <text x="160" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Measurement-Based Classification</text>
    <rect x="0" y="16" width="320" height="44" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="160" y="36" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">3 Numbers That Classify Your Body Type</text>
    <text x="160" y="52" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">Shoulder  ·  Waist  ·  Hip</text>

    <rect x="0" y="74" width="320" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="10" y="90" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Shoulder ≈ Hip, Waist narrow</text>
    <text x="310" y="90" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">→ Hourglass</text>
    <text x="10" y="104" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">(WHR 0.65–0.75)</text>

    <rect x="0" y="122" width="320" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="10" y="138" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Shoulder &gt; Hip significantly</text>
    <text x="310" y="138" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">→ Inverted Triangle</text>
    <text x="10" y="152" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">(Shoulder/Hip ratio &gt; 1.05)</text>

    <rect x="0" y="170" width="320" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="10" y="186" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Hip &gt; Shoulder significantly</text>
    <text x="310" y="186" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">→ Pear Shape</text>
    <text x="10" y="200" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">(Hip/Shoulder ratio &gt; 1.05)</text>

    <rect x="0" y="218" width="320" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="10" y="234" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Shoulder ≈ Hip, Waist similar</text>
    <text x="310" y="234" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">→ Rectangle</text>
    <text x="10" y="248" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">(WHR &gt; 0.85)</text>
  </g>

  <g transform="translate(430,92)">
    <text x="155" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Why Labels Fail</text>
    <rect x="0" y="16" width="310" height="50" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="155" y="36" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">"Pear shape" vs measurement:</text>
    <text x="155" y="56" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Visual self-assessment is wrong ~40% of the time</text>

    <rect x="0" y="80" width="310" height="50" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="155" y="100" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">Same "pear" label, 3 different WHRs:</text>
    <text x="155" y="120" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">0.68 · 0.74 · 0.79 → need different styling</text>

    <rect x="0" y="144" width="310" height="50" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="155" y="164" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">Data-first approach</text>
    <text x="155" y="184" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Measure → classify → style. No guessing.</text>

    <rect x="0" y="208" width="310" height="58" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="155" y="228" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">4 measurements take 3 minutes</text>
    <text x="155" y="246" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Results: accurate body type + styling rules</text>
    <text x="155" y="262" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">→ Use FITME's free analysis tool</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · Data-Based Body Type Finder</text>
</svg>
