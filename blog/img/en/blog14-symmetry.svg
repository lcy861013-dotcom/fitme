<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">BODY SYMMETRY &amp; ATTRACTIVENESS</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">What Science Says About Symmetry and Proportion</text>

  <g transform="translate(50,92)">
    <text x="150" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Symmetry Science</text>
    <rect x="0" y="16" width="300" height="54" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="150" y="37" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">Facial/body symmetry is rated attractive</text>
    <text x="150" y="57" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">across cultures — a biological signal of health</text>

    <rect x="0" y="84" width="300" height="54" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="150" y="104" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">Most people have minor asymmetry</text>
    <text x="150" y="124" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Left shoulder higher · uneven hips are common</text>

    <rect x="0" y="152" width="300" height="54" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="150" y="172" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">Styling can visually correct asymmetry</text>
    <text x="150" y="192" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Pattern, padding, fit balance the perception</text>

    <rect x="0" y="220" width="300" height="44" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="150" y="240" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Study: 90% of people prefer symmetric outfits</text>
    <text x="150" y="257" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">even when body asymmetry is present</text>
  </g>

  <g transform="translate(420,92)">
    <text x="160" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Proportion Standards</text>
    <rect x="0" y="16" width="320" height="46" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="160" y="36" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">Face: width ≈ 1/3 of face height</text>
    <text x="160" y="54" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Eyes halfway down the head = perceived ideal</text>

    <rect x="0" y="76" width="320" height="46" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="160" y="96" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">Body: shoulder = hip ± 5%</text>
    <text x="160" y="114" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Waist = 70% of shoulder — golden zone</text>

    <rect x="0" y="136" width="320" height="46" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="160" y="156" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">Clothing as visual balance tool</text>
    <text x="160" y="174" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Correct proportion → increase perceived symmetry</text>

    <rect x="0" y="196" width="320" height="70" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="160" y="216" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Shoulder pad: raises lower shoulder</text>
    <text x="160" y="232" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">A-line skirt: balances wider hips</text>
    <text x="160" y="248" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Vertical stripe: reduces boxy mid-section</text>
    <text x="160" y="264" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">Clothing corrects — not cosmetic surgery</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · Symmetry &amp; Proportion Science</text>
</svg>
