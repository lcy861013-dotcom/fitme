<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">COLOR COORDINATION STRATEGY</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">Color Coordination — Body-Correcting Color Strategy</text>

  <g transform="translate(40,90)">
    <text x="100" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Monochrome</text>
    <rect x="20" y="16" width="60" height="80" rx="4" fill="#1a1a2e" stroke="#2a2724"/>
    <rect x="60" y="16" width="60" height="80" rx="4" fill="#16213e" stroke="#2a2724"/>
    <rect x="100" y="16" width="60" height="80" rx="4" fill="#0f3460" stroke="#2a2724"/>
    <text x="100" y="116" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Same tone, varied lightness</text>
    <rect x="20" y="128" width="160" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="100" y="144" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Effect: Creates vertical length</text>
    <text x="100" y="158" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">Best for shorter frames</text>
    <rect x="20" y="174" width="160" height="36" rx="6" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="100" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Dark bottom + light top</text>
    <text x="100" y="204" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">Slimming lower body effect</text>
  </g>

  <g transform="translate(290,90)">
    <text x="100" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Color Blocking</text>
    <rect x="20" y="16" width="80" height="80" rx="4" fill="#2d4a22" stroke="#2a2724"/>
    <rect x="120" y="16" width="80" height="80" rx="4" fill="#4a2d22" stroke="#2a2724"/>
    <text x="100" y="116" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Contrasting color blocks</text>
    <rect x="20" y="128" width="160" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="100" y="144" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Effect: Divides visual weight</text>
    <text x="100" y="158" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">Best for inverted triangle</text>
    <rect x="20" y="174" width="160" height="36" rx="6" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="100" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Dark top + light bottom</text>
    <text x="100" y="204" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">Slimming upper body effect</text>
  </g>

  <g transform="translate(540,90)">
    <text x="110" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Dark vs Light Rule</text>
    <rect x="10" y="16" width="100" height="44" rx="4" fill="#111" stroke="#2a2724"/>
    <text x="60" y="42" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">Dark colors</text>
    <rect x="120" y="16" width="100" height="44" rx="4" fill="#e8e8e8" stroke="#2a2724"/>
    <text x="170" y="42" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#333">Light colors</text>
    <rect x="10" y="70" width="100" height="34" rx="4" fill="#1c1a18" stroke="#2a2724"/>
    <text x="60" y="90" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Slimming</text>
    <rect x="120" y="70" width="100" height="34" rx="4" fill="#1c1a18" stroke="#2a2724"/>
    <text x="170" y="90" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Volume-adding</text>
    <rect x="10" y="120" width="210" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="115" y="136" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Highlight → go lighter</text>
    <text x="115" y="150" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">Minimize → go darker</text>
    <rect x="10" y="168" width="210" height="50" rx="6" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="115" y="186" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">ALL BLACK Look</text>
    <text x="115" y="202" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Works for every body type</text>
    <text x="115" y="214" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">+5cm height illusion effect</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · Color Coordination Laws</text>
</svg>
