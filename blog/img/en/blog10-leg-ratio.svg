<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">LOOK TALLER · 5 OUTFIT TRICKS</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">5 Styling Tricks That Add 2 Inches of Visual Height</text>

  <g transform="translate(40,92)">
    <rect x="0" y="0" width="140" height="130" rx="10" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="70" y="24" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" fill="#d4a84b">↑</text>
    <text x="70" y="52" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">01 · High Waist</text>
    <text x="70" y="70" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">High-rise pants &amp;</text>
    <text x="70" y="84" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">skirts raise visual</text>
    <text x="70" y="98" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">leg line</text>
    <text x="70" y="120" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#d4a84b">+5–7 cm effect</text>
  </g>

  <g transform="translate(200,92)">
    <rect x="0" y="0" width="140" height="130" rx="10" fill="#1c1a18" stroke="#2a2724" stroke-width="1.5"/>
    <text x="70" y="24" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" fill="#d4a84b">▮</text>
    <text x="70" y="52" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">02 · All One Color</text>
    <text x="70" y="70" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Monochrome top-to-</text>
    <text x="70" y="84" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">bottom extends the</text>
    <text x="70" y="98" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">visual vertical line</text>
    <text x="70" y="120" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#d4a84b">No horizontal break</text>
  </g>

  <g transform="translate(360,92)">
    <rect x="0" y="0" width="140" height="130" rx="10" fill="#1c1a18" stroke="#2a2724" stroke-width="1.5"/>
    <text x="70" y="24" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" fill="#d4a84b">⟷</text>
    <text x="70" y="52" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">03 · V-Neck</text>
    <text x="70" y="70" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Deep neckline draws</text>
    <text x="70" y="84" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">eye downward, adds</text>
    <text x="70" y="98" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">vertical length</text>
    <text x="70" y="120" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#d4a84b">Elongates upper body</text>
  </g>

  <g transform="translate(520,92)">
    <rect x="0" y="0" width="140" height="130" rx="10" fill="#1c1a18" stroke="#2a2724" stroke-width="1.5"/>
    <text x="70" y="24" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" fill="#d4a84b">|</text>
    <text x="70" y="52" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">04 · Vertical Stripes</text>
    <text x="70" y="70" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Pinstripes and rib</text>
    <text x="70" y="84" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">patterns guide eye</text>
    <text x="70" y="98" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">upward</text>
    <text x="70" y="120" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#d4a84b">Classic height hack</text>
  </g>

  <g transform="translate(680,92)">
    <rect x="0" y="0" width="90" height="130" rx="10" fill="#1c1a18" stroke="#2a2724" stroke-width="1.5"/>
    <text x="45" y="24" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" fill="#d4a84b">▲</text>
    <text x="45" y="52" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b" font-weight="700">05 · Ankle</text>
    <text x="45" y="65" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b" font-weight="700">Exposure</text>
    <text x="45" y="82" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Cropped hem</text>
    <text x="45" y="95" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">shows ankle,</text>
    <text x="45" y="108" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">elongates leg</text>
    <text x="45" y="122" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#d4a84b">Leg ↑ effect</text>
  </g>

  <rect x="40" y="245" width="720" height="60" rx="10" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
  <text x="400" y="268" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">Combine All 5 → Maximum Effect</text>
  <text x="400" y="290" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">High-waist monochrome + V-neck + vertical stripe + ankle-length = up to +10 cm visual height</text>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · 5 Tricks to Look Taller</text>
</svg>
