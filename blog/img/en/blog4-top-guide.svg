    <text x="85" y="135" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">✓ Waist-defining tops</text>
    <text x="85" y="150" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">✓ Belt · tuck-in styling</text>
    <text x="85" y="165" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ Boxy oversized</text>
  </g>

  <g transform="translate(410,90)">
    <text x="85" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">Pear Shape</text>
