<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">DATA-DRIVEN PERSONAL STYLING</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">Stop Guessing Your Style — Let Data Decide</text>

  <g transform="translate(40,92)">
    <text x="160" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">The Data-Style Loop</text>
    <rect x="0" y="16" width="320" height="44" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="160" y="36" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">① Measure</text>
    <text x="160" y="52" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Shoulder · waist · hip · inseam · arm length</text>

    <rect x="0" y="74" width="320" height="44" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="160" y="94" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#e0dcd8" font-weight="700">② Calculate Ratios</text>
    <text x="160" y="110" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">WHR · shoulder:hip · leg ratio · torso length</text>

    <rect x="0" y="132" width="320" height="44" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="160" y="152" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#e0dcd8" font-weight="700">③ Identify Body Type</text>
    <text x="160" y="168" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">No guessing — numbers tell you exactly</text>

    <rect x="0" y="190" width="320" height="44" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="160" y="210" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#e0dcd8" font-weight="700">④ Apply Styling Rules</text>
    <text x="160" y="226" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Data maps to proven styling guidelines</text>

    <rect x="0" y="248" width="320" height="30" rx="6" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="160" y="268" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">Result: Clothes that fit your body, not the model</text>
  </g>

  <g transform="translate(430,92)">
    <text x="155" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Data vs. Guessing</text>
    <rect x="0" y="16" width="155" height="80" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="78" y="35" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178" font-weight="700">Guessing</text>
    <text x="78" y="53" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Mirror + feeling</text>
    <text x="78" y="67" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Often wrong</text>
    <text x="78" y="81" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#ff6b6b">~40% error rate</text>

    <rect x="155" y="16" width="155" height="80" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="233" y="35" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">Data</text>
    <text x="233" y="53" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Tape measure</text>
    <text x="233" y="67" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Objective ratios</text>
    <text x="233" y="81" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#d4a84b">Exact result</text>

    <rect x="0" y="112" width="310" height="54" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="155" y="132" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Shopping time saved: ~3hrs/season</text>
    <text x="155" y="150" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Return rate: drops 60% with measurement-first</text>

    <rect x="0" y="180" width="310" height="44" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="155" y="200" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">5 measurements → FITME analysis</text>
    <text x="155" y="218" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Free · under 3 minutes</text>

    <rect x="0" y="238" width="310" height="40" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="155" y="262" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">Data → Style → Confidence</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · Data-Driven Personal Styling</text>
</svg>
