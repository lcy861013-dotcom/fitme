<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">SHOULDER WIDTH STYLING GUIDE</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">How Shoulder Width Changes Your Entire Outfit</text>

  <g transform="translate(40,92)">
    <text x="110" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">Wide Shoulders</text>
    <text x="110" y="18" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Shoulder &gt; hip width</text>
    <path d="M20,35 L200,35 L175,115 L45,115 Z" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="110" y="140" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">✓ V-neck · raglan sleeves</text>
    <text x="110" y="156" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">✓ Dark tops · fitted sleeves</text>
    <text x="110" y="172" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ Boat neck · off-shoulder</text>
    <text x="110" y="188" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ Puff sleeves · padded shoulders</text>
  </g>

  <g transform="translate(300,92)">
    <text x="100" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">Narrow Shoulders</text>
    <text x="100" y="18" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Shoulder &lt; hip width</text>
    <path d="M40,35 L160,35 L180,115 L20,115 Z" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="100" y="140" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">✓ Boat neck · off-shoulder</text>
    <text x="100" y="156" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">✓ Puff sleeves · horizontal top</text>
    <text x="100" y="172" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ Halter neck</text>
    <text x="100" y="188" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#ff6b6b">✗ Racerback · spaghetti straps</text>
  </g>

  <g transform="translate(530,92)">
    <text x="120" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">How to Measure</text>
    <rect x="0" y="16" width="240" height="50" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="120" y="36" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">Biacromial width (bone to bone)</text>
    <text x="120" y="56" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Left shoulder tip → right shoulder tip</text>

    <rect x="0" y="80" width="240" height="50" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="120" y="100" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">Average (women): 36 – 38 cm</text>
    <text x="120" y="120" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Average (men): 40 – 44 cm</text>

    <rect x="0" y="144" width="240" height="66" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="120" y="163" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">Key Ratio</text>
    <text x="120" y="181" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Shoulder : Hip = 1:1 → balanced</text>
    <text x="120" y="199" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Style aims to achieve this ratio visually</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · Shoulder Width Style Guide</text>
</svg>
