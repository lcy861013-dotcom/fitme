    <text x="160" y="32" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">3 Tops · 2 Bottoms · 1 Dress · 2 Layers · 2 Shoes</text>
