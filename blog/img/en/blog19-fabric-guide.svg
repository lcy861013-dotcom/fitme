<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">FABRIC GUIDE BY BODY TYPE</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">Fabric That Drapes vs. Fabric That Clings</text>

  <g transform="translate(40,92)">
    <text x="160" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Drape vs. Structure</text>
    <rect x="0" y="16" width="155" height="180" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="78" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">Drapey Fabrics</text>
    <text x="78" y="56" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Silk · chiffon · rayon</text>
    <text x="78" y="72" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Satin · jersey · modal</text>
    <text x="78" y="96" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Flows with the body</text>
    <text x="78" y="112" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Softens sharp angles</text>
    <text x="78" y="128" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Skims without clinging</text>
    <text x="78" y="152" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">Best for: curves,</text>
    <text x="78" y="166" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">hourglass, pear</text>
    <text x="78" y="182" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">softening strong shapes</text>

    <rect x="165" y="16" width="155" height="180" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="243" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8" font-weight="700">Structured Fabrics</text>
    <text x="243" y="56" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Wool · tweed · denim</text>
    <text x="243" y="72" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Canvas · ponte · linen</text>
    <text x="243" y="96" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Holds its own shape</text>
    <text x="243" y="112" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Adds definition &amp; bulk</text>
    <text x="243" y="128" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Creates structure</text>
    <text x="243" y="152" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Best for: adding</text>
    <text x="243" y="166" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">volume to rectangle,</text>
    <text x="243" y="182" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">inverted triangle</text>
  </g>

  <g transform="translate(420,92)">
    <text x="165" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">Fabric Rules by Body Type</text>
    <rect x="0" y="16" width="330" height="40" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="165" y="32" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Hourglass: drapey fabric follows curves naturally</text>
    <text x="165" y="48" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Avoid stiff, boxy fabric that hides your shape</text>

    <rect x="0" y="66" width="330" height="40" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="165" y="82" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Inverted Triangle: structured bottom, soft top</text>
    <text x="165" y="98" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Wide-leg structured trouser balances shoulders</text>

    <rect x="0" y="116" width="330" height="40" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="165" y="132" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Pear: structured top + drapey bottom</text>
    <text x="165" y="148" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Puff sleeve + flowing A-line = balance</text>

    <rect x="0" y="166" width="330" height="40" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="165" y="182" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">Rectangle: structured with waist detailing</text>
    <text x="165" y="198" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Belted wool coat creates the curve for you</text>

    <rect x="0" y="216" width="330" height="36" rx="6" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="165" y="232" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">Avoid stretchy cling on areas to minimize</text>
    <text x="165" y="246" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#8b8178">Fabric weight and drape change everything</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · Fabric Guide by Body Type</text>
</svg>
