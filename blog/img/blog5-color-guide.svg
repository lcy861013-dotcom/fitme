<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b08d3d;stop-opacity:1" />
    </linearGradient>
    <style>
      .title { font-family: 'DM Sans', sans-serif; font-size: 24px; font-weight: 700; fill: #e0dcd8; }
      .subtitle { font-family: 'DM Sans', sans-serif; font-size: 14px; fill: #8b8178; letter-spacing: 4px; }
      .label { font-family: 'DM Sans', sans-serif; font-size: 12px; fill: #8b8178; }
      .accent-text { font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; fill: #d4a84b; }
      .line { stroke: #2a2724; stroke-width: 1; }
      .accent-line { stroke: #d4a84b; stroke-width: 2; fill: none; filter: url(#glow); }
      .dashed { stroke-dasharray: 4, 3; }
    </style>
  </defs>
  <rect width="800" height="420" fill="#161412"/>
  
  <!-- Header -->
  <text x="400" y="45" text-anchor="middle" class="subtitle">PROFESSIONAL COLOR PALETTE</text>
  <text x="400" y="75" text-anchor="middle" class="title">전문적인 컬러 매칭 가이드</text>

  
  <g transform="translate(150,150)">
    <circle cx="100" cy="100" r="80" class="accent-line" />
    <circle cx="100" cy="100" r="40" fill="#d4a84b" opacity="0.5" />
    <line x1="100" y1="20" x2="100" y2="180" class="line" />
    <line x1="20" y1="100" x2="180" y2="100" class="line" />
    <text x="100" y="220" text-anchor="middle" class="accent-text">COLOR WHEEL</text>
  </g>
  <rect x="400" y="150" width="60" height="60" fill="#d4a84b" rx="5" />
  <rect x="470" y="150" width="60" height="60" fill="#161412" stroke="#d4a84b" rx="5" />
  <rect x="540" y="150" width="60" height="60" fill="#8b8178" rx="5" />


  <!-- Footer -->
  <line x1="100" y1="380" x2="700" y2="380" class="line" />
  <text x="400" y="405" text-anchor="middle" class="label">PERFECTFITME.COM • PROFESSIONAL FASHION DATA ANALYSIS</text>
</svg>