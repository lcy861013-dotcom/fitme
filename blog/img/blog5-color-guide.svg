<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">COLOR COORDINATION STRATEGY</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">컬러 코디의 법칙 — 체형 보정 컬러 전략</text>

  <!-- Monochrome -->
  <g transform="translate(40,90)">
    <text x="100" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">모노크롬</text>
    <rect x="20" y="16" width="60" height="80" rx="4" fill="#1a1a2e" stroke="#2a2724"/>
    <rect x="60" y="16" width="60" height="80" rx="4" fill="#16213e" stroke="#2a2724"/>
    <rect x="100" y="16" width="60" height="80" rx="4" fill="#0f3460" stroke="#2a2724"/>
    <text x="100" y="116" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">같은 계열 명도 변화</text>
    <rect x="20" y="128" width="160" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="100" y="144" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">효과: 세로로 길어 보임</text>
    <text x="100" y="158" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">키 작은 체형에 추천</text>
    <rect x="20" y="174" width="160" height="36" rx="6" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="100" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">어두운 하의 + 밝은 상의</text>
    <text x="100" y="204" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">하체 슬리밍 효과</text>
  </g>

  <!-- Color blocking -->
  <g transform="translate(290,90)">
    <text x="100" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">컬러 블로킹</text>
    <rect x="20" y="16" width="80" height="80" rx="4" fill="#2d4a22" stroke="#2a2724"/>
    <rect x="120" y="16" width="80" height="80" rx="4" fill="#4a2d22" stroke="#2a2724"/>
    <text x="100" y="116" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">대비색 블록 배치</text>
    <rect x="20" y="128" width="160" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="100" y="144" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">효과: 시선 분산, 볼륨 조절</text>
    <text x="100" y="158" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">역삼각형 체형에 추천</text>
    <rect x="20" y="174" width="160" height="36" rx="6" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="100" y="190" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">어두운 상의 + 밝은 하의</text>
    <text x="100" y="204" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">상체 슬리밍 효과</text>
  </g>

  <!-- Dark vs Light -->
  <g transform="translate(540,90)">
    <text x="110" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">어둡고 밝음의 법칙</text>
    <rect x="10" y="16" width="100" height="44" rx="4" fill="#111" stroke="#2a2724"/>
    <text x="60" y="42" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">어두운 색</text>
    <rect x="120" y="16" width="100" height="44" rx="4" fill="#e8e8e8" stroke="#2a2724"/>
    <text x="170" y="42" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#333">밝은 색</text>
    <rect x="10" y="70" width="100" height="34" rx="4" fill="#1c1a18" stroke="#2a2724"/>
    <text x="60" y="90" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">수축 · 슬리밍</text>
    <rect x="120" y="70" width="100" height="34" rx="4" fill="#1c1a18" stroke="#2a2724"/>
    <text x="170" y="90" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">팽창 · 볼륨업</text>

    <rect x="10" y="120" width="210" height="36" rx="6" fill="#1c1a18" stroke="#2a2724"/>
    <text x="115" y="136" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">강조하고 싶은 부위 → 밝게</text>
    <text x="115" y="150" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">숨기고 싶은 부위 → 어둡게</text>

    <rect x="10" y="168" width="210" height="50" rx="6" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="115" y="186" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">ALL BLACK 룩</text>
    <text x="115" y="202" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">모든 체형 + 5cm 키업 효과</text>
    <text x="115" y="214" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">무조건 시도해볼 것</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · 컬러 코디의 법칙</text>
</svg>
