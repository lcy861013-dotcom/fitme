<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">AI &amp; THE FUTURE OF PERSONAL STYLING</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">퍼스널 스타일링의 미래 — AI가 바꾸는 것</text>

  <!-- Flow diagram -->
  <!-- Input -->
  <g transform="translate(40,100)">
    <rect x="0" y="0" width="160" height="180" rx="10" fill="#1c1a18" stroke="#2a2724"/>
    <text x="80" y="24" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#8b8178" font-weight="700">INPUT</text>
    <text x="80" y="44" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="22" fill="#d4a84b">📏</text>
    <text x="80" y="72" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">키 · 몸무게 · 허리</text>
    <line x1="20" y1="84" x2="140" y2="84" stroke="#2a2724"/>
    <text x="80" y="102" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">어깨 · 힙 · 다리</text>
    <text x="80" y="118" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">라이프스타일</text>
    <text x="80" y="134" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">선호 스타일</text>
    <text x="80" y="150" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">예산</text>
    <text x="80" y="170" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">3가지 필수 측정만으로도 시작 가능</text>
  </g>

  <!-- Arrow 1 -->
  <text x="215" y="202" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="24" fill="#d4a84b">→</text>

  <!-- AI Processing -->
  <g transform="translate(240,100)">
    <rect x="0" y="0" width="180" height="180" rx="10" fill="#1c1a18" stroke="#d4a84b" stroke-width="2"/>
    <text x="90" y="24" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">AI 분석</text>
    <text x="90" y="50" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="24" fill="#d4a84b">⚙️</text>
    <text x="90" y="76" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">황금비율 계산</text>
    <text x="90" y="92" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">WHR · 어깨비율</text>
    <text x="90" y="108" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">다리-상체 지수</text>
    <text x="90" y="124" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">체형 분류</text>
    <text x="90" y="140" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">패션 DB 매칭</text>
    <rect x="20" y="156" width="140" height="16" rx="4" fill="#2a2724"/>
    <text x="90" y="168" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="9" fill="#d4a84b">FITME DNA Score™ 계산</text>
  </g>

  <!-- Arrow 2 -->
  <text x="437" y="202" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="24" fill="#d4a84b">→</text>

  <!-- Output -->
  <g transform="translate(460,100)">
    <rect x="0" y="0" width="290" height="180" rx="10" fill="#1c1a18" stroke="#2a2724"/>
    <text x="145" y="24" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#8b8178" font-weight="700">OUTPUT</text>
    <text x="10" y="48" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b" font-weight="700">✓ 체형 분류 + DNA 점수</text>
    <text x="10" y="66" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">역삼각형 · WHR 0.79 · 74점</text>
    <line x1="10" y1="76" x2="280" y2="76" stroke="#2a2724"/>
    <text x="10" y="94" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b" font-weight="700">✓ 강점/약점 분석</text>
    <text x="10" y="110" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">강점: 넓은 어깨 · 약점: 하체 볼륨</text>
    <line x1="10" y1="120" x2="280" y2="120" stroke="#2a2724"/>
    <text x="10" y="138" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b" font-weight="700">✓ 맞춤 스타일 추천</text>
    <text x="10" y="154" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">V넥 · 와이드팬츠 · 하체 볼륨업</text>
    <line x1="10" y1="164" x2="280" y2="164" stroke="#2a2724"/>
    <text x="10" y="178" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">✓ 구매 가이드 + 수선 필요 부위</text>
  </g>

  <!-- What AI can't do -->
  <rect x="40" y="306" width="720" height="50" rx="8" fill="#1c1a18" stroke="#2a2724"/>
  <text x="400" y="326" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">현재 AI 스타일링의 한계와 가능성</text>
  <text x="400" y="344" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">가능: 비율 분석 · 체형 분류 · 스타일 추천 / 한계: 소재 질감 · 착용감 · 브랜드별 핏 차이는 직접 입어봐야 함</text>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · AI 퍼스널 스타일링의 미래</text>
</svg>
