<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">DATA-DRIVEN BODY TYPE ANALYSIS</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">실제 데이터로 내 체형 찾기</text>

  <!-- Input measurements -->
  <g transform="translate(40,90)">
    <text x="150" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#8b8178" letter-spacing="2">입력 데이터</text>
    <rect x="0" y="16" width="300" height="180" rx="10" fill="#1c1a18" stroke="#2a2724"/>
    <!-- Measurement items -->
    <text x="20" y="44" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">키</text>
    <rect x="140" y="30" width="140" height="26" rx="4" fill="#0f0e0d" stroke="#d4a84b"/>
    <text x="210" y="47" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">170 cm</text>

    <text x="20" y="80" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">몸무게</text>
    <rect x="140" y="66" width="140" height="26" rx="4" fill="#0f0e0d" stroke="#d4a84b"/>
    <text x="210" y="83" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">65 kg</text>

    <text x="20" y="116" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">허리 둘레</text>
    <rect x="140" y="102" width="140" height="26" rx="4" fill="#0f0e0d" stroke="#d4a84b"/>
    <text x="210" y="119" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">76 cm</text>

    <text x="20" y="152" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">어깨 너비</text>
    <rect x="140" y="138" width="140" height="26" rx="4" fill="#0f0e0d" stroke="#2a2724"/>
    <text x="210" y="155" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#8b8178">44 cm</text>

    <text x="20" y="188" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">힙 둘레</text>
    <rect x="140" y="174" width="140" height="26" rx="4" fill="#0f0e0d" stroke="#2a2724"/>
    <text x="210" y="191" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#8b8178">96 cm</text>
  </g>

  <!-- Arrow -->
  <text x="380" y="195" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="28" fill="#d4a84b">→</text>

  <!-- Output analysis -->
  <g transform="translate(420,90)">
    <text x="170" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">FITME 분석 결과</text>
    <rect x="0" y="16" width="340" height="80" rx="10" fill="#1c1a18" stroke="#d4a84b" stroke-width="2"/>
    <text x="170" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#d4a84b" font-weight="700">체형: 역삼각형 (Inverted Triangle)</text>
    <text x="170" y="56" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">WHR: 0.79 · 어깨-허리 차: +14cm</text>
    <text x="170" y="74" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">FITME DNA 점수: 74 / 100</text>

    <!-- Sub metrics -->
    <text x="0" y="116" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178" font-weight="700">비율 분석</text>
    <rect x="0" y="124" width="340" height="28" rx="4" fill="#0f0e0d" stroke="#2a2724"/>
    <text x="10" y="142" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">다리 비율 (아웃사이드)</text>
    <rect x="180" y="128" width="120" height="16" rx="8" fill="#2a2724"/>
    <rect x="180" y="128" width="84" height="16" rx="8" fill="#d4a84b" opacity="0.7"/>
    <text x="305" y="141" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">51%</text>

    <rect x="0" y="158" width="340" height="28" rx="4" fill="#0f0e0d" stroke="#2a2724"/>
    <text x="10" y="176" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">허리-골반 비율 (WHR)</text>
    <rect x="180" y="162" width="120" height="16" rx="8" fill="#2a2724"/>
    <rect x="180" y="162" width="76" height="16" rx="8" fill="#d4a84b" opacity="0.7"/>
    <text x="305" y="175" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">0.79</text>

    <rect x="0" y="192" width="340" height="28" rx="4" fill="#0f0e0d" stroke="#2a2724"/>
    <text x="10" y="210" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">어깨-허리 차이</text>
    <rect x="180" y="196" width="120" height="16" rx="8" fill="#2a2724"/>
    <rect x="180" y="196" width="90" height="16" rx="8" fill="#d4a84b" opacity="0.7"/>
    <text x="305" y="209" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">+14cm</text>

    <rect x="0" y="234" width="340" height="36" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="170" y="250" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">추천 스타일</text>
    <text x="170" y="264" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">V넥 · 와이드팬츠 · 하체 볼륨 강조</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · 실제 데이터로 내 체형 찾기</text>
</svg>
