<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap');
      .title { font-family: 'Noto Sans KR', sans-serif; font-size: 28px; font-weight: 700; fill: #e0dcd8; }
      .subtitle { font-family: 'DM Sans', sans-serif; font-size: 14px; fill: #8b8178; letter-spacing: 4px; font-weight: 400; }
      .label { font-family: 'DM Sans', sans-serif; font-size: 11px; fill: #5b5148; letter-spacing: 1px; }
      .accent-line { stroke: #d4a84b; stroke-width: 2.5; fill: none; filter: url(#glow); }
      .fabric-grid { stroke: #2a2724; stroke-width: 1; fill: none; }
      .text-small { font-family: 'Noto Sans KR', sans-serif; font-size: 13px; fill: #8b8178; }
    </style>
  </defs>
  
  <rect width="800" height="420" fill="#161412"/>
  
  <!-- Background Pattern (Fabric Grid) -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f1d1b" stroke-width="1"/>
  </pattern>
  <rect width="800" height="420" fill="url(#grid)" />

  <!-- Header -->
  <text x="400" y="50" text-anchor="middle" class="subtitle">FABRIC & DRAPE ANALYSIS</text>
  <text x="400" y="90" text-anchor="middle" class="title">체형별 소재와 드레이프 가이드</text>

  <!-- Visual Representation: Drape vs Structure -->
  <g transform="translate(100, 160)">
    <!-- Structured Fabric (Square/Sharp) -->
    <rect x="50" y="20" width="200" height="150" rx="4" class="fabric-grid" stroke-dasharray="4,4" />
    <path d="M50,20 L250,20 L250,170 L50,170 Z" stroke="#d4a84b" stroke-width="1.5" fill="none" opacity="0.3" />
    <text x="150" y="195" text-anchor="middle" class="text-small">STRUCTURED (탄탄한 소재)</text>
    
    <!-- Draping Fabric (Wavy/Fluid) -->
    <path d="M400,20 C450,40 420,100 450,150 C480,200 550,130 600,150 L600,20 C550,40 500,0 450,20 Z" class="accent-line" />
    <path d="M400,20 C450,40 420,100 450,150 C480,200 550,130 600,150" stroke="#d4a84b" stroke-width="3" fill="none" filter="url(#glow)" />
    <text x="500" y="195" text-anchor="middle" class="text-small">DRAPING (드레이프 소재)</text>
  </g>

  <!-- Footer -->
  <rect x="300" y="375" width="200" height="1" fill="#2a2724" />
  <text x="400" y="400" text-anchor="middle" class="label">PERFECTFITME.COM • PROFESSIONAL DATA ANALYSIS</text>
</svg>