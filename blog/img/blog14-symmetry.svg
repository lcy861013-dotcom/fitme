<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#161412"/>
  <text x="400" y="38" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="13" fill="#8b8178" letter-spacing="3">SYMMETRY &amp; ATTRACTIVENESS SCIENCE</text>
  <text x="400" y="66" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="20" font-weight="700" fill="#e0dcd8">대칭성과 매력 — 과학이 말하는 것</text>

  <!-- Symmetry scale -->
  <g transform="translate(40,90)">
    <text x="160" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#8b8178" letter-spacing="2">좌우 대칭 지수</text>
    <defs>
      <linearGradient id="symGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#333;stop-opacity:1"/>
        <stop offset="50%" style="stop-color:#d4a84b;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#d4a84b;stop-opacity:0.8"/>
      </linearGradient>
    </defs>
    <rect x="0" y="16" width="320" height="16" rx="8" fill="url(#symGrad)"/>
    <text x="0" y="46" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">비대칭</text>
    <text x="260" y="46" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">완전 대칭</text>

    <!-- Research findings -->
    <rect x="0" y="58" width="320" height="180" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="160" y="78" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">연구 결과</text>
    <line x1="20" y1="86" x2="300" y2="86" stroke="#2a2724"/>
    <text x="20" y="104" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">좌우 얼굴 비율 차이 &lt;2mm</text>
    <text x="20" y="120" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">→ 매력도 상위 20% 범위</text>
    <text x="20" y="142" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">어깨 높이 차이 &lt;5mm</text>
    <text x="20" y="158" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">→ 의류 착용 시 자연스러운 실루엣</text>
    <text x="20" y="180" font-family="'DM Sans',sans-serif" font-size="10" fill="#e0dcd8">완전한 대칭은 불가능</text>
    <text x="20" y="196" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">→ 평균 ±2~5mm 비대칭이 정상</text>
    <text x="20" y="218" font-family="'DM Sans',sans-serif" font-size="10" fill="#d4a84b">★ 대칭성보다 비율이 더 큰 영향</text>
    <text x="20" y="232" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">Thornhill &amp; Gangestad, 1993 연구 기반</text>
  </g>

  <!-- How to improve -->
  <g transform="translate(400,90)">
    <text x="175" y="0" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="12" fill="#d4a84b" font-weight="700">스타일로 대칭 보완하는 법</text>

    <rect x="0" y="16" width="350" height="50" rx="8" fill="#1c1a18" stroke="#d4a84b" stroke-width="1.5"/>
    <text x="175" y="36" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#d4a84b" font-weight="700">어깨 높이 차이 있을 때</text>
    <text x="175" y="54" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">구조적 어깨 패딩 → 시각적 수평 보정</text>

    <rect x="0" y="80" width="350" height="50" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="175" y="100" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">한쪽 어깨 더 발달했을 때</text>
    <text x="175" y="118" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">보트넥으로 시선을 가로 방향으로 분산</text>

    <rect x="0" y="144" width="350" height="50" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="175" y="164" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">얼굴 비대칭 보완</text>
    <text x="175" y="182" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">중앙 분리 헤어 → 비대칭 시각화 최소화</text>

    <rect x="0" y="208" width="350" height="50" rx="8" fill="#1c1a18" stroke="#2a2724"/>
    <text x="175" y="228" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#e0dcd8">목 길이 비대칭</text>
    <text x="175" y="246" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">V넥 · 딥넥으로 시선을 아래로 유도</text>
  </g>

  <line x1="40" y1="395" x2="760" y2="395" stroke="#2a2724" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="11" fill="#8b8178">perfectfitme.com · 대칭성과 매력의 과학</text>
</svg>
