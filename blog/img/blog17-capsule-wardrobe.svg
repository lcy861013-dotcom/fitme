  <text x="400" y="332" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="10" fill="#8b8178">10가지 기본템 × 3번씩 조합 = 30가지 코디. 각 아이템은 최소 3가지 다른 아이템과 코디 가능해야 구매 정당화.</text>
