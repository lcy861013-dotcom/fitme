<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — FITME</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"></noscript>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 6px;
      color: #e8ff47;
      margin-bottom: 60px;
      text-decoration: none;
    }
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 140px;
      line-height: 1;
      letter-spacing: 8px;
      color: #1a1a1a;
      position: relative;
      margin-bottom: 8px;
    }
    .code span {
      color: #e8ff47;
    }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      color: #f0f0f0;
      margin-bottom: 16px;
    }
    .desc {
      font-size: 15px;
      color: #666;
      line-height: 1.7;
      max-width: 380px;
      margin-bottom: 48px;
    }
    .btn {
      display: inline-block;
      padding: 14px 40px;
      background: #e8ff47;
      color: #0a0a0a;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #f5ff80;
      box-shadow: 0 4px 30px rgba(232,255,71,0.4);
      transform: translateY(-2px);
    }
    .bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: #e8ff47;
    }
  </style>
</head>
<body>
  <div class="bar"></div>
  <a class="logo" href="/">FITME</a>
  <div class="code"><span>4</span>0<span>4</span></div>
  <div class="title">PAGE NOT FOUND</div>
  <p class="desc">찾으시는 페이지가 없어요.<br>체형 분석은 홈에서 바로 시작할 수 있어요.</p>
  <a class="btn" href="/">홈으로 돌아가기</a>
</body>
</html>
